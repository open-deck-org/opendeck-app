<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenDeck icon background (light)">
  <!-- Icon Composer BACKGROUND layer — light. Full-bleed paper gradient.
       The OS applies the rounded-rect mask; let it bleed to the edges. -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAF8"/>
      <stop offset="1" stop-color="#F0F0EA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#paper)"/>
</svg>
