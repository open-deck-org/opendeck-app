<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenDeck app icon">
  <!-- ============================================================
       OpenDeck — app-icon master (light). The "stacked deck / D" mark.
       Two named groups map 1:1 to Icon Composer layers:
         #bg  → Background layer (paper)
         #fg  → Foreground layer (three stacked cards; front two are
                semi-transparent for glassy depth — "variant 2")
       Mark scaled to 90% so it doesn't crowd the icon edges.
       Per-layer card: rounded rect, left r=48, right r=290 (the "D").
       Dark + tinted appearances: opendeck-icon-dark.svg / -tinted.svg.
       ============================================================ -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAF8"/>
      <stop offset="1" stop-color="#F0F0EA"/>
    </linearGradient>
  </defs>

  <g id="bg">
    <rect width="1024" height="1024" fill="url(#paper)"/>
  </g>

  <g id="fg" transform="translate(512 512) scale(0.9) translate(-512 -512)">
    <!-- back card -->
    <path d="M282 162 H654 A290 290 0 0 1 944 452 V492 A290 290 0 0 1 654 782 H282 A48 48 0 0 1 234 734 V210 A48 48 0 0 1 282 162 Z"
          fill="#8C897C" stroke="#FFFFFF" stroke-opacity="0.26" stroke-width="4"/>
    <!-- middle card (semi-transparent) -->
    <path d="M240 206 H612 A290 290 0 0 1 902 496 V536 A290 290 0 0 1 612 826 H240 A48 48 0 0 1 192 778 V254 A48 48 0 0 1 240 206 Z"
          fill="#BBB8AC" fill-opacity="0.82" stroke="#FFFFFF" stroke-opacity="0.42" stroke-width="4"/>
    <!-- front card (most transparent — the glassy top) -->
    <path d="M198 250 H570 A290 290 0 0 1 860 540 V580 A290 290 0 0 1 570 870 H198 A48 48 0 0 1 150 822 V298 A48 48 0 0 1 198 250 Z"
          fill="#E7E5DD" fill-opacity="0.70" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="4"/>
  </g>
</svg>
