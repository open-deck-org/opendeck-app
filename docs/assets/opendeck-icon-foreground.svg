<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenDeck icon foreground">
  <!-- Android adaptive-icon FOREGROUND layer: the deck mark only, transparent
       background (the paper color is supplied by @color/ic_launcher_background).
       Scaled ~1.2× around the mark's optical center so it fills the 66% safe
       zone after Android's 18dp margins. -->
  <g transform="translate(512 535) scale(1.2) translate(-512 -535)">
    <rect x="312" y="250" width="400" height="470" rx="56"
          fill="none" stroke="#1A1A1A" stroke-opacity="0.18" stroke-width="20"/>
    <rect x="272" y="300" width="480" height="470" rx="64" fill="#1A1A1A"/>
    <circle cx="512" cy="535" r="132" fill="none" stroke="#FAFAF8" stroke-width="34"/>
  </g>
</svg>
